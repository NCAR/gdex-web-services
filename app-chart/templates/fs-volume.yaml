{{ if and .Values.volume (not .Values.testName) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.volume.fs.name }}
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: cephfs
  resources:
    requests:
      storage: {{ .Values.volume.fs.size | default "1Gi" }}
{{ end }}
