apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  {{ if .Values.testName }}
  name: {{ .Values.testName }}-{{ .Values.webapp.name }}
  {{ else }}
  name: {{ .Values.webapp.name }}
  {{ end }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ if .Values.testName }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    app.kubernetes.io/name: {{ .Values.testName }}-gdex-web-services
    app.kubernetes.io/instance: {{ .Values.testName }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{ end }}
    group: {{ .Values.webapp.group }}
  annotations:
    cert-manager.io/cluster-issuer: "incommon"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "{{ .Values.webapp.container.responseTimeout }}"
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.webapp.container.maxUploadSize }}
spec:
  ingressClassName: {{ .Values.webapp.ingress.ingressClassName }}
  tls:
    - hosts:
      - {{ .Values.webapp.tls.fqdn }}
      secretName: {{ .Values.webapp.tls.secretName }}
  rules:
  - host: {{ .Values.webapp.tls.fqdn }}
    http:
      paths:
      - path: {{ .Values.webapp.path }}
        pathType: Prefix
        backend:
          service:
            {{ if .Values.testName }}
            name: {{ .Values.testName }}-{{ .Values.webapp.name }}
            {{ else }}
            name: {{ .Values.webapp.name }}
            {{ end }}
            port:
              number: {{ .Values.webapp.container.port }}
